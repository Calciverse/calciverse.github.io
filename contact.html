<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us - Calqube</title>

<meta name="description" content="Contact Calqube for support, feedback or business inquiries. We are here to help you.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<style>
.contact-box{
background:#fff;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:700px;
margin:auto;
}

.contact-box input,
.contact-box textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

.contact-box button{
background:#22c55e;
border:none;
padding:12px 18px;
color:#fff;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.contact-info{
margin-top:20px;
padding:15px;
background:#ecfdf5;
border-left:5px solid #22c55e;
border-radius:8px;
}
</style>

</head>

<body>

<header class="navbar">
<div class="container nav-content">
<div class="logo">Calqube</div>
<nav>
<a href="index.html">Home</a>
<a href="calculators/index.html">Calculators</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</div>
</header>

<section class="hero">
<div class="container">
<h1>Contact Us</h1>
<p>We are here to help and support you.</p>
</div>
</section>

<section class="categories">
<div class="container">

<div class="contact-box">

<form onsubmit="sendMessage(event)">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" rows="5" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>
</form>

<div class="contact-info">
<p><b>Email:</b> adinovalabs@zohomail.in</p>
<p>We usually respond within 24–48 hours.</p>
</div>

</div>

</div>
</section>

<footer class="footer">
<div class="container">
<p>© 2026 Calqube. All Rights Reserved.</p>
<div class="footer-links">
<a href="about.html">About</a> |
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="terms.html">Terms</a> |
<a href="contact.html">Contact</a>
</div>
</div>
</footer>

<script>
function sendMessage(e){
e.preventDefault();
alert("Thank you! Your message has been received. We will contact you soon.");
}
</script>

</body>
</html>
